<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 布局与颜色示例</title>
    <style>
        /* 第一部分：CSS 颜色示例 */
        .box {
            width: 200px;
            height: 200px;
            /* rgba 颜色：最后一位是透明度（0-1） */
            background-color: rgba(0, 0, 0, .7);
            margin-bottom: 20px; /* 增加底部间距，方便查看 */
        }

        /* 第二部分：页面布局样式（link 区域） */
        /* 清除浮动影响，避免高度塌陷 */
        .link {
            overflow: hidden; 
            /* 替代方案：也可以用 clear: both; 这里用 overflow 更简洁 */
        }

        /* 左侧区域 */
        .link .left {
            width: 300px; /* 最终生效的宽度，覆盖之前的 260px 配置 */
            height: 300px;
            background-color: powderblue; /* 单词形式颜色 */
            float: left; /* 横向排列 */
            border-radius: 13px; /* 圆角 */
        }

        /* 中间区域 */
        .link .center {
            width: 400px; /* 最终生效的宽度，覆盖之前的 645px 配置 */
            height: 300px;
            background-color: yellow; /* 单词形式颜色 */
            float: left; /* 横向排列 */
            margin-left: 40px; /* 左侧外边距 */
        }

        /* 右侧区域 */
        .link .right {
            width: 300px;
            height: 300px;
            background-color: hotpink; /* 单词形式颜色 */
            float: right; /* 靠右排列 */
        }

        /* 第三部分：头部、广告区域基础样式（补充） */
        .header {
            margin-bottom: 10px;
        }
        .header .content {
            padding: 10px;
            border: 1px solid #ccc;
        }
        .hot {
            padding: 10px;
            border: 1px solid #f0ad4e;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <div class="header">
        <div class="content">网页头部区域</div>
    </div>

    <!-- 广告区域 -->
    <div class="hot">广告区域</div>

    <!-- 布局主体：左中右 + 取色器 -->
    <div class="link">
        <div class="left">左边区域</div>
        <div class="center">中间区域</div>
        <div class="right">右边区域</div>
    </div>

    <!-- 颜色示例盒子 -->
    <div class="box"></div>

    <!-- 取色器示例 -->
    <!-- <input type="color"> -->
    <div style="margin-top: 20px;">
        <label>取色器示例：</label>
        <input type="color">
    </div>
</body>
</html>
